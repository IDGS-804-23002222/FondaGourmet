<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Buffet</title>
    <style>
      .navbar-brand img{height:40px;width:auto;margin-right:10px}
      @media(max-width:576px){.navbar-brand img{height:32px}}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='images/logoBuffet.png') }}" alt="logoBuffet">
      BUFFET
    </a>
 
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
 
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
 
        <li class="nav-item">
           <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
             href="{{ url_for('index') }}">Inicio</a>
        </li>
 
        <li class="nav-item">
           <a class="nav-link {% if request.endpoint == 'usuarios' %}active{% endif %}"
             href="{{ url_for('usuarios') }}">Usuarios</a>
        </li>
 
        <li class="nav-item">
           <a class="nav-link {% if request.endpoint == 'alumnos' %}active{% endif %}"
             href="{{ url_for('alumnos') }}">Alumnos</a>
        </li>
 
      </ul>
    </div>
  </div>
</nav>

<!-- % contenido % para crear bloques -->
<div class="container mt-5 pt-5">
{% block content %}
{% endblock %}
</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
