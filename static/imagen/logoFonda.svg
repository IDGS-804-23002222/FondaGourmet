<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="url(#grad1)"/>
  
  <!-- Fork icon (utensil for restaurant) -->
  <g transform="translate(150, 150)">
    <!-- Handle -->
    <rect x="-8" y="30" width="16" height="50" fill="white" rx="8"/>
    
    <!-- Prongs -->
    <rect x="-50" y="-40" width="12" height="70" fill="white" rx="6"/>
    <rect x="-20" y="-40" width="12" height="70" fill="white" rx="6"/>
    <rect x="8" y="-40" width="12" height="70" fill="white" rx="6"/>
    
    <!-- Connector -->
    <rect x="-48" y="20" width="96" height="12" fill="white" rx="6"/>
  </g>
</svg>
