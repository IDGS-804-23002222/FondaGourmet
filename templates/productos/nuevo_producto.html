{% extends "base.html" %}
{% block title %}Nuevo Producto{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Registrar Nuevo Producto</h1>
        <p>Complete los datos del producto para agregarlo al sistema</p>
    </div>
    
    <div class="form-container">
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="nombre">Nombre del producto</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre del producto" required>
                    <small>Nombre que aparecerá en el menú</small>
                </div>
                
                <div class="form-group-half">
                    <label for="categoria">Categoría</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Seleccione una categoría</option>
                        <option value="plato_fuerte">Plato fuerte</option>
                        <option value="bebidas">Bebidas</option>
                        <option value="postres">Postres</option>
                        <option value="antojitos">Antojitos</option>
                        <option value="entradas">Entradas</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="precio">Precio de venta</label>
                    <input type="number" step="0.01" id="precio" name="precio" placeholder="0.00" required>
                </div>
                
                <div class="form-group-half">
                    <label for="costo">Costo de producción</label>
                    <input type="number" step="0.01" id="costo" name="costo" placeholder="0.00">
                    <small>Costo de los ingredientes</small>
                </div>
                
                <div class="form-group-half">
                    <label for="tiempo">Tiempo de preparación (minutos)</label>
                    <input type="number" id="tiempo" name="tiempo" placeholder="Ej: 15">
                </div>
                
                <div class="form-group-full">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="3" placeholder="Descripción del producto"></textarea>
                </div>
                
                <div class="form-group-half">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="activo" selected>Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Guardar producto</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/productos'">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
