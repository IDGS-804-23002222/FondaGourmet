{% extends "base.html" %}
{% block title %}Editar Producto{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Editar Producto</h1>
        <p>Modificando producto ID: {{ id }}</p>
    </div>
    
    <div class="form-container">
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="nombre">Nombre del producto</label>
                    <input type="text" id="nombre" name="nombre" value="Producto Ejemplo" required>
                </div>
                
                <div class="form-group-half">
                    <label for="categoria">Categoría</label>
                    <select id="categoria" name="categoria" required>
                        <option value="plato_fuerte" selected>Plato fuerte</option>
                        <option value="bebidas">Bebidas</option>
                        <option value="postres">Postres</option>
                        <option value="antojitos">Antojitos</option>
                        <option value="entradas">Entradas</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="precio">Precio de venta</label>
                    <input type="number" step="0.01" id="precio" name="precio" value="0.00" required>
                </div>
                
                <div class="form-group-half">
                    <label for="costo">Costo de producción</label>
                    <input type="number" step="0.01" id="costo" name="costo" value="0.00">
                </div>
                
                <div class="form-group-half">
                    <label for="tiempo">Tiempo de preparación (minutos)</label>
                    <input type="number" id="tiempo" name="tiempo" value="15">
                </div>
                
                <div class="form-group-full">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="3">Descripción del producto ejemplo</textarea>
                </div>
                
                <div class="form-group-half">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="activo" selected>Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                </div>
            </div>
            
            <div class="info-card">
                <div class="info-text">
                    <strong>Información adicional</strong><br>
                    Total ventas: Ejemplo | Última venta: Fecha de ejemplo
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Actualizar producto</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/productos'">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
