{% extends "base.html" %}
{% block title %}Editar Venta{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Editar Venta</h1>
        <p>Modificando venta ID: {{ id }}</p>
    </div>
    
    <div class="form-container">
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="cliente">Cliente</label>
                    <select id="cliente" name="cliente" required>
                        <option value="mostrador">Cliente mostrador</option>
                        <option value="mesa1" selected>Mesa 1</option>
                        <option value="mesa2">Mesa 2</option>
                        <option value="mesa3">Mesa 3</option>
                        <option value="llevar">Pedido para llevar</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" value="Usuario ejemplo" disabled>
                </div>
                
                <div class="form-group-half">
                    <label for="fecha">Fecha/Hora</label>
                    <input type="datetime-local" id="fecha" value="2026-03-28T12:00">
                </div>
                
                <div class="form-group-half">
                    <label for="pago">Método de pago</label>
                    <select id="pago" name="pago">
                        <option value="efectivo" selected>Efectivo</option>
                        <option value="tarjeta">Tarjeta</option>
                        <option value="transferencia">Transferencia</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="completada" selected>Completada</option>
                        <option value="pendiente">Pendiente</option>
                        <option value="cancelada">Cancelada</option>
                    </select>
                </div>
            </div>
            
            <h3 style="margin-top: 25px; margin-bottom: 15px; color: var(--verde);">Detalles de la venta</h3>
            
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio Unitario</th>
                        <th>Subtotal</th>
                        <th></th>
                     </tr>
                </thead>
                <tbody>
                     <tr>
                         <td>
                            <select name="producto[]">
                                <option value="1" selected>Producto Ejemplo 1</option>
                                <option value="2">Producto Ejemplo 2</option>
                                <option value="3">Producto Ejemplo 3</option>
                            </select>
                         </td>
                         <td><input type="number" step="0.5" value="2" min="0.5"></td>
                         <td><input type="number" step="0.01" value="0.00" min="0"></td>
                         <td class="subtotal">0.00</td>
                         <td><button type="button" class="btn-delete">Eliminar</button></td>
                     </tr>
                </tbody>
                <tfoot>
                     <tr>
                        <td colspan="3" style="text-align: right; font-weight: bold;">Subtotal:</td>
                        <td>0.00</td>
                        <td></td>
                     </tr>
                     <tr>
                        <td colspan="3" style="text-align: right;">IVA (16%):</td>
                        <td>0.00</td>
                        <td></td>
                     </tr>
                     <tr style="font-weight: bold; background: #f0f0f0;">
                        <td colspan="3" style="text-align: right;">Total:</td>
                        <td>0.00</td>
                        <td></td>
                     </tr>
                </tfoot>
            </table>
            
            <button type="button" class="btn-secondary">Agregar producto</button>
            
            <div class="form-actions" style="margin-top: 25px;">
                <button type="submit" class="btn-primary btn-large">Actualizar venta</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/ventas'">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
