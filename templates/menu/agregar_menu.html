{% extends "base.html" %}
{% block title %}Agregar al Menú{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Agregar Producto al Menú</h1>
        <p>Seleccione un producto para agregarlo al menú</p>
    </div>
    
    <div class="form-container">
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="producto">Producto</label>
                    <select id="producto" name="producto" required>
                        <option value="">Seleccione un producto</option>
                        <option value="1">Producto Ejemplo 1</option>
                        <option value="2">Producto Ejemplo 2</option>
                        <option value="3">Producto Ejemplo 3</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="categoria">Categoría en menú</label>
                    <select id="categoria" name="categoria" required>
                        <option value="plato_fuerte">Plato fuerte</option>
                        <option value="bebidas">Bebidas</option>
                        <option value="postres">Postres</option>
                        <option value="antojitos">Antojitos</option>
                        <option value="entradas">Entradas</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="precio_especial">Precio especial (opcional)</label>
                    <input type="number" step="0.01" id="precio_especial" name="precio_especial" placeholder="Dejar en blanco para usar precio regular">
                </div>
                
                <div class="form-group-half">
                    <label for="disponibilidad">Disponibilidad</label>
                    <select id="disponibilidad" name="disponibilidad">
                        <option value="disponible" selected>Disponible</option>
                        <option value="no_disponible">No disponible</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="destacado">Destacar en menú</label>
                    <select id="destacado" name="destacado">
                        <option value="no">No</option>
                        <option value="si">Sí (aparecerá en sección destacados)</option>
                    </select>
                </div>
                
                <div class="form-group-full">
                    <label for="descripcion">Descripción corta</label>
                    <textarea id="descripcion" name="descripcion" rows="2" placeholder="Breve descripción para el menú"></textarea>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Agregar al menú</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/menu'">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
