{% extends "base.html" %}
{% block title %}Cambiar Disponibilidad{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Cambiar Disponibilidad</h1>
        <p>Modificando disponibilidad del item ID: {{ id }}</p>
    </div>
    
    <div class="form-container">
        <div class="info-card">
            <div class="info-text">
                <strong>Información del producto</strong><br>
                Producto: Producto Ejemplo | Disponibilidad actual: <span class="badge active">Disponible</span>
            </div>
        </div>
        
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="nueva_disponibilidad">Nueva disponibilidad</label>
                    <select id="nueva_disponibilidad" name="nueva_disponibilidad">
                        <option value="no_disponible">No disponible</option>
                        <option value="disponible">Disponible</option>
                    </select>
                </div>
                
                <div class="form-group-full">
                    <label for="motivo">Motivo del cambio</label>
                    <textarea id="motivo" name="motivo" rows="2" placeholder="Ej: Falta de ingredientes, mantenimiento, etc."></textarea>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Guardar cambios</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/menu'">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<style>
.info-card {
    background: #f8f9fa;
    border-left: 4px solid var(--verde);
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 20px;
}
.info-text {
    font-size: 0.85rem;
    color: #555;
}
</style>
{% endblock %}
