<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Casa Gourmet | La delicia del hogar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
            url('{{ url_for("static", filename="images/tacos.jpg") }}') center/cover no-repeat;
            height: 100vh;
            display: flex;
            align-items: center;
            color: white;
            position: relative;
        }

        .main-content {
    margin: 0 auto;
    padding: 20px;
    max-width: 900px;
}
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            color: white;
            position: relative;
        }

        .hero-content {
            z-index: 2;
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .hero p {
            font-size: 1.5rem;
            font-weight: 300;
        }

        .food-image {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .nav-link {
            color: white !important;
            font-weight: 500;
        }

        .btn-valencia {
            background: #e63939;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
        }

        .btn-valencia:hover {
            background: #d62828;
            transform: scale(1.05);
        }

        .nav-link {
            color: #fff !important;
        }

        .nav-link:hover {
            background: #495057;
        }

        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        .brand-logo {
            height: 38px;
            width: auto;
            margin-right: 10px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <img class="brand-logo" src="{{ url_for('static', filename='images/logoFonda.jpg') }}" alt="logo buffet">
            <h1 class="navbar-brand fw-bold fs-4">Casa Gourmet</h1>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Menú</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Nosotros</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Calificaciones</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.login') }}">Iniciar Sesión</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="main-content col-md-9 col-lg-10">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, msg in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show">{{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
    </div>
    </div>
