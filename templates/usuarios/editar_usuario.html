{% extends "base.html" %}
{% block title %}Editar Usuario{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Editar Usuario</h1>
        <p>Modificando usuario ID: {{ id }}</p>
    </div>
    
    <div class="form-container">
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" value="admin" required>
                    <small>El usuario será utilizado para iniciar sesión</small>
                </div>
                
                <div class="form-group-full">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Dejar en blanco para no cambiar">
                    <small>Complete solo si desea cambiar la contraseña actual</small>
                </div>
                
                <div class="form-group-half">
                    <label for="rol">Rol del usuario</label>
                    <select id="rol" name="rol">
                        <option selected>Administrador</option>
                        <option>Cajero</option>
                        <option>Cocinero</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="idEmpleado">Empleado asociado</label>
                    <select id="idEmpleado" name="idEmpleado">
                        <option selected>Paulo Essau</option>
                        <option>Diana Martínez</option>
                        <option>Jairo López</option>
                    </select>
                </div>
            </div>
            
            
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Actualizar usuario</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/usuarios'">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
