{% extends "base.html" %}
{% block title %}Nuevo Usuario{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Crear Nuevo Usuario</h1>
        <p>Complete los siguientes datos para registrar un nuevo usuario en el sistema</p>
    </div>
    
    <div class="form-container">
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingrese nombre de usuario" required>
                    <small>El usuario será utilizado para iniciar sesión</small>
                </div>
                
                <div class="form-group-full">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese una contraseña segura" required>
                    <small>Mínimo 6 caracteres</small>
                </div>
                
                <div class="form-group-half">
                    <label for="rol">Rol del usuario</label>
                    <select id="rol" name="rol">
                        <option value="Administrador">Administrador</option>
                        <option value="Cajero">Cajero</option>
                        <option value="Cocinero">Cocinero</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="idEmpleado">Empleado asociado</label>
                    <select id="idEmpleado" name="idEmpleado">
                        <option value="Paulo Essau">Paulo Essau</option>
                        <option value="Diana Martínez">Diana Martínez</option>
                        <option value="Jairo López">Jairo López</option>
                    </select>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Guardar usuario</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/usuarios'">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
