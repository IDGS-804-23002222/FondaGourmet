{% extends "base.html" %}
{% block title %}Editar pedido{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='style/pages/pedidos.css') }}">
{% endblock %}

{% block content %}
<h1 class="section-title">Editar Pedido #{{ pedido.id_pedido }}</h1>

<form method="POST" id="formEditarPedido">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="mb-3">
        <label class="form-label">Método de pago</label>
        <select class="form-select" name="metodo_pago" required>
            <option value="Efectivo" {% if pedido.meta_pedido and pedido.meta_pedido.metodo_pago == 'Efectivo' %}selected{% endif %}>Efectivo</option>
            <option value="Tarjeta" {% if pedido.meta_pedido and pedido.meta_pedido.metodo_pago == 'Tarjeta' %}selected{% endif %}>Tarjeta</option>
            <option value="Transferencia" {% if pedido.meta_pedido and pedido.meta_pedido.metodo_pago == 'Transferencia' %}selected{% endif %}>Transferencia</option>
        </select>
    </div>

    <div class="pedidos-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="productosContainer">
                {% for d in pedido.detalles %}
                <tr class="pedido-row">
                    <td>
                        <select class="form-select" name="id_producto[]" required>
                            <option value="">Selecciona un producto</option>
                            {% for p in productos %}
                                <option value="{{ p.id_producto }}" {% if p.id_producto == d.id_producto %}selected{% endif %}>{{ p.nombre }}</option>
                            {% endfor %}
                        </select>
                    </td>
                    <td>
                        <input class="form-control" type="number" name="cantidad[]" min="1" step="1" value="{{ d.cantidad }}" required>
                    </td>
                    <td>
                        <button type="button" class="btn btn-danger" onclick="eliminarRenglonProducto(this)">Quitar</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="mt-3 d-flex gap-2">
        <button type="button" class="btn btn-warning" onclick="agregarRenglonProducto()">Agregar producto</button>
        <button type="submit" class="btn btn-success">Guardar cambios</button>
        <a href="{{ url_for('pedidos.mis_pedidos') }}" class="btn btn-secondary">Volver</a>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
function templateProductoRow() {
    return `
        <tr class="pedido-row">
            <td>
                <select class="form-select" name="id_producto[]" required>
                    <option value="">Selecciona un producto</option>
                    {% for p in productos %}
                        <option value="{{ p.id_producto }}">{{ p.nombre }}</option>
                    {% endfor %}
                </select>
            </td>
            <td>
                <input class="form-control" type="number" name="cantidad[]" min="1" step="1" value="1" required>
            </td>
            <td>
                <button type="button" class="btn btn-danger" onclick="eliminarRenglonProducto(this)">Quitar</button>
            </td>
        </tr>
    `;
}

function agregarRenglonProducto() {
    const container = document.getElementById('productosContainer');
    if (!container) return;
    container.insertAdjacentHTML('beforeend', templateProductoRow());
}

function eliminarRenglonProducto(btn) {
    const container = document.getElementById('productosContainer');
    if (!container) return;
    if (container.querySelectorAll('.pedido-row').length <= 1) return;
    btn.closest('.pedido-row').remove();
}
</script>
{% endblock %}
