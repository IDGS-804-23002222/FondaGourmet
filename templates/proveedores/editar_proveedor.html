{% extends "base.html" %}
{% block title %}Editar Proveedor{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Editar Proveedor</h1>
        <p>Modificando proveedor ID: {{ id }}</p>
    </div>
    
    <div class="form-container">
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="nombre">Nombre del proveedor</label>
                    <input type="text" id="nombre" name="nombre" value="Proveedor Ejemplo" required>
                </div>
                
                <div class="form-group-half">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" value="0000000000" required>
                </div>
                
                <div class="form-group-half">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" value="proveedor@ejemplo.com">
                </div>
                
                <div class="form-group-full">
                    <label for="direccion">Dirección</label>
                    <textarea id="direccion" name="direccion" rows="2">Dirección de ejemplo</textarea>
                </div>
                
                <div class="form-group-half">
                    <label for="contacto">Persona de contacto</label>
                    <input type="text" id="contacto" name="contacto" value="Contacto Ejemplo">
                </div>
                
                <div class="form-group-half">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="activo" selected>Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                </div>
                
                <div class="form-group-full">
                    <label for="observaciones">Observaciones</label>
                    <textarea id="observaciones" name="observaciones" rows="2">Observaciones de ejemplo</textarea>
                </div>
            </div>
            
            <div class="info-card">
                <div class="info-text">
                    <strong>Información de compras</strong><br>
                    Última compra: Fecha de ejemplo | Total compras: Monto de ejemplo
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Actualizar proveedor</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/proveedores'">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
