<body>
    <!-- Navbar mejorado -->
    <nav class="navbar navbar-dark fixed-top">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center gap-3">
                <button class="mobile-menu-btn" id="mobileMenuToggle">
                    <i class="bi bi-list"></i>
                </button>
                <a class="navbar-brand" href="{{ url_for('dashboard.index') }}">
                    <img class="brand-logo" src="{{ url_for('static', filename='imagen/logoFonda.svg') }}" alt="logo fonda">
                    <span class="brand-text">Casa Gourmet</span>
                </a>
            </div>

            {% if current_user.is_authenticated %}
            <div class="dropdown">
                <button class="btn btn-dark dropdown-toggle d-flex align-items-center gap-2" type="button" data-bs-toggle="dropdown" style="border-radius: 50px; padding: 8px 20px;">
                    <i class="bi bi-person-circle fs-5"></i>
                    <span>{{ current_user.username }}</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="{{ url_for('usuarios.miPerfil') }}">
                            <i class="bi bi-pencil-square"></i> Editar perfil
                        </a>
                    </li>
                    <li>
                        <a class="dropdown-item" href="{{ url_for('usuarios.detallesUsuario') }}">
                            <i class="bi bi-eye"></i> Ver perfil
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-danger" href="{{ url_for('auth.logout') }}">
                            <i class="bi bi-box-arrow-right"></i> Cerrar sesión
                        </a>
                    </li>
                </ul>
            </div>
            {% else %}
            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-light" style="border-radius: 50px; padding: 8px 25px;">
                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
            </a>
            {% endif %}
        </div>
    </nav>
