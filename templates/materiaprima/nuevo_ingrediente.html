{% extends "base.html" %}
{% block title %}Nuevo Ingrediente{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-header">
        <h1>Registrar Nuevo Ingrediente</h1>
        <p>Complete los datos del ingrediente</p>
    </div>
    
    <div class="form-container">
        <form>
            <div class="form-grid">
                <div class="form-group-full">
                    <label for="nombre">Nombre del ingrediente</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Nombre del ingrediente" required>
                </div>
                
                <div class="form-group-half">
                    <label for="categoria">Categoría</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Seleccione una categoría</option>
                        <option value="lacteos">Lácteos</option>
                        <option value="verduras">Verduras</option>
                        <option value="carnes">Carnes</option>
                        <option value="granos">Granos</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="unidad">Unidad de medida</label>
                    <select id="unidad" name="unidad" required>
                        <option value="kg">Kilogramos (kg)</option>
                        <option value="g">Gramos (g)</option>
                        <option value="L">Litros (L)</option>
                        <option value="ml">Mililitros (ml)</option>
                        <option value="pz">Piezas (pz)</option>
                    </select>
                </div>
                
                <div class="form-group-half">
                    <label for="stock_inicial">Stock inicial</label>
                    <input type="number" step="0.1" id="stock_inicial" name="stock_inicial" placeholder="0.0" required>
                </div>
                
                <div class="form-group-half">
                    <label for="stock_minimo">Stock mínimo</label>
                    <input type="number" step="0.1" id="stock_minimo" name="stock_minimo" placeholder="0.0" required>
                </div>
                
                <div class="form-group-half">
                    <label for="costo">Costo promedio</label>
                    <input type="number" step="0.01" id="costo" name="costo" placeholder="0.00" required>
                </div>
                
                <div class="form-group-half">
                    <label for="proveedor">Proveedor principal</label>
                    <select id="proveedor" name="proveedor">
                        <option value="">Seleccione un proveedor</option>
                        <option value="1">Proveedor Ejemplo 1</option>
                        <option value="2">Proveedor Ejemplo 2</option>
                    </select>
                </div>
                
                <div class="form-group-full">
                    <label for="ubicacion">Ubicación</label>
                    <input type="text" id="ubicacion" name="ubicacion" placeholder="Ej: Estante A1, Refrigerador 2">
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">Guardar ingrediente</button>
                <button type="button" class="btn-secondary btn-large" onclick="window.location.href='/materiaprima'">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
