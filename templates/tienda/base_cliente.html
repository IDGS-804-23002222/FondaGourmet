<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Casa Gourmet - {% block title %}{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/layout/navbar.css') }}" type="text/css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/layout/sidebar.css') }}" type="text/css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/components/forms.css') }}" type="text/css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/components/buttons.css') }}" type="text/css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style/components/modals.css') }}" type="text/css">    
    <link rel="stylesheet" href="{{ url_for('static', filename='style/components/alerts.css') }}" type="text/css">    
    <link rel="stylesheet" href="{{ url_for('static', filename='style/components/tables.css') }}" type="text/css">
    {% block head %}{% endblock %}
</head>

<body>
<header class="cliente-header">
    {% include "includes/_nav.html" %}
</header>
        <main class="cliente-main">
            {% include "includes/_alerts.html" %}
            {% block content %}{% endblock %}
        </main>
    <footer class="cliente-footer">
        {% include "includes/_footer.html" %}
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/alerts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components/sidebar.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
