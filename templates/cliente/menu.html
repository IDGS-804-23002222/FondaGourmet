{% extends "cliente/base_cliente.html" %}
{% block title %}Menú{% endblock %}

{% block content %}

<h1 class="menu-title">Nuestro Menú</h1>

<div class="productos-grid cliente-menu-list">
    {% for producto in productos %}
    <div class="producto-card cliente-producto-card">

        <div class="producto-img-area">
            <!-- Aquí podrías mostrar una imagen en el futuro -->
            <div class="producto-placeholder"></div>
        </div>

        <div class="producto-info">
            <h3>{{ producto.nombre }}</h3>
            <p class="descripcion">{{ producto.descripcion }}</p>
            <p class="precio">${{ "%.2f"|format(producto.precio) }}</p>

            <a href="{{ url_for('cliente.agregar_carrito', id=producto.id) }}" class="btn-success btn-add">
                Agregar al carrito
            </a>
        </div>

    </div>
    {% endfor %}
</div>

{% endblock %}
