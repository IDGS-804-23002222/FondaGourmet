{% extends "cliente/base_cliente.html" %}
{% block title %}Crear cuenta{% endblock %}

{% block content %}

<div class="cliente-login-container">

    <div class="cliente-login-card">

        <h2 class="login-title">Crear cuenta</h2>

        <form method="POST" class="login-form">

            <div class="form-group">
                <label for="nombre">Nombre completo</label>
                <input type="text" name="nombre" required>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <button class="btn-primary login-btn">Registrarse</button>

        </form>

        <p class="alt-link">
            ¿Ya tienes una cuenta?
            <a href="{{ url_for('cliente.login') }}">Iniciar sesión</a>
        </p>

    </div>

</div>

{% endblock %}
